name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.5"
  SCONS_CACHE_LIMIT: 7168

jobs:
  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux (x86_64)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download prebuilt godot-cpp
        run: |
          GODOT_VERSION="4.5-stable"
          DOWNLOAD_URL="https://github.com/NodotProject/godot-cpp-builds/releases/download/godot-${GODOT_VERSION}/godot-cpp-prebuilt-godot-${GODOT_VERSION}.zip"
          curl -L --fail "${DOWNLOAD_URL}" -o godot-cpp-prebuilt.zip
          TEMP_DIR=$(mktemp -d)
          unzip -oq godot-cpp-prebuilt.zip -d "${TEMP_DIR}"
          if [ -d "${TEMP_DIR}/godot-cpp-prebuilt" ]; then
            cp -r "${TEMP_DIR}/godot-cpp-prebuilt/"* godot-cpp/
          else
            cp -r "${TEMP_DIR}/"* godot-cpp/
          fi
          rm -rf "${TEMP_DIR}" godot-cpp-prebuilt.zip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          echo "set man-db/auto-update false" | sudo debconf-communicate
          sudo dpkg-reconfigure man-db
          sudo apt-get update
          sudo apt-get install -y build-essential scons

      - name: Setup SCons cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.scons-cache/
          key: ${{ runner.os }}-release-scons-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ${{ runner.os }}-release-scons-

      - name: Build GDExtension
        env:
          SCONS_CACHE_DIR: ${{ github.workspace }}/.scons-cache/
        run: |
          scons platform=linux target=template_release -j$(nproc)

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: libretrohost-linux-x86_64
          path: demo/bin/LibRetroHost/lib/Linux-x86_64/
          retention-days: 7

  build-windows:
    runs-on: ubuntu-latest
    name: Build Windows (x86_64, cross-compile)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download prebuilt godot-cpp
        run: |
          GODOT_VERSION="4.5-stable"
          DOWNLOAD_URL="https://github.com/NodotProject/godot-cpp-builds/releases/download/godot-${GODOT_VERSION}/godot-cpp-prebuilt-godot-${GODOT_VERSION}.zip"
          curl -L --fail "${DOWNLOAD_URL}" -o godot-cpp-prebuilt.zip
          TEMP_DIR=$(mktemp -d)
          unzip -oq godot-cpp-prebuilt.zip -d "${TEMP_DIR}"
          if [ -d "${TEMP_DIR}/godot-cpp-prebuilt" ]; then
            cp -r "${TEMP_DIR}/godot-cpp-prebuilt/"* godot-cpp/
          else
            cp -r "${TEMP_DIR}/"* godot-cpp/
          fi
          rm -rf "${TEMP_DIR}" godot-cpp-prebuilt.zip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          echo "set man-db/auto-update false" | sudo debconf-communicate
          sudo dpkg-reconfigure man-db
          sudo apt-get update
          sudo apt-get install -y build-essential scons mingw-w64

      - name: Setup SCons cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.scons-cache/
          key: ${{ runner.os }}-windows-scons-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ${{ runner.os }}-windows-scons-

      - name: Build GDExtension
        env:
          SCONS_CACHE_DIR: ${{ github.workspace }}/.scons-cache/
        run: |
          scons platform=windows target=template_release use_mingw=yes -j$(nproc)

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: libretrohost-windows-x86_64
          path: demo/bin/LibRetroHost/lib/Windows-AMD64/
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    name: Build macOS (Universal)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download prebuilt godot-cpp
        run: |
          GODOT_VERSION="4.5-stable"
          DOWNLOAD_URL="https://github.com/NodotProject/godot-cpp-builds/releases/download/godot-${GODOT_VERSION}/godot-cpp-prebuilt-godot-${GODOT_VERSION}.zip"
          curl -L --fail "${DOWNLOAD_URL}" -o godot-cpp-prebuilt.zip
          TEMP_DIR=$(mktemp -d)
          unzip -oq godot-cpp-prebuilt.zip -d "${TEMP_DIR}"
          if [ -d "${TEMP_DIR}/godot-cpp-prebuilt" ]; then
            cp -r "${TEMP_DIR}/godot-cpp-prebuilt/"* godot-cpp/
          else
            cp -r "${TEMP_DIR}/"* godot-cpp/
          fi
          rm -rf "${TEMP_DIR}" godot-cpp-prebuilt.zip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          brew install scons

      - name: Setup SCons cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.scons-cache/
          key: ${{ runner.os }}-scons-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ${{ runner.os }}-scons-

      - name: Build GDExtension (x86_64)
        env:
          SCONS_CACHE_DIR: ${{ github.workspace }}/.scons-cache/
        run: |
          scons platform=macos target=template_release arch=x86_64

      - name: Build GDExtension (arm64)
        env:
          SCONS_CACHE_DIR: ${{ github.workspace }}/.scons-cache/
        run: |
          scons platform=macos target=template_release arch=arm64

      - name: Create universal binary
        run: |
          cd demo/bin/LibRetroHost/lib/Darwin-Universal
          # Find and combine the architecture-specific libraries
          if [ -f "libLibRetroHost.x86_64.dylib" ] && [ -f "libLibRetroHost.arm64.dylib" ]; then
            lipo -create libLibRetroHost.x86_64.dylib libLibRetroHost.arm64.dylib -output libLibRetroHost.dylib
            rm libLibRetroHost.x86_64.dylib libLibRetroHost.arm64.dylib
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: libretrohost-macos-universal
          path: demo/bin/LibRetroHost/lib/Darwin-Universal/
          retention-days: 7

  create-addon-package:
    runs-on: ubuntu-latest
    name: Create addon package
    needs: [build-linux, build-windows, build-macos]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create package directory
        run: mkdir -p package/addons/LibRetroHost/lib

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: libretrohost-linux-x86_64
          path: package/addons/LibRetroHost/lib/Linux-x86_64/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: libretrohost-windows-x86_64
          path: package/addons/LibRetroHost/lib/Windows-AMD64/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: libretrohost-macos-universal
          path: package/addons/LibRetroHost/lib/Darwin-Universal/

      - name: Copy gdextension file
        run: |
          cp demo/bin/LibRetroHost/LibRetroHost.gdextension package/addons/LibRetroHost/

      - name: Copy README and LICENSE
        run: |
          cp README.md package/addons/LibRetroHost/ || echo "README.md not found"
          cp LICENSE package/addons/LibRetroHost/ || echo "LICENSE file not found"

      - name: Generate SHA256 checksums
        run: |
          cd package/addons/LibRetroHost/lib
          find . -type f \( -name "*.so" -o -name "*.dll" -o -name "*.dylib" \) -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - name: Create addon archive
        run: |
          cd package
          zip -r ../libretrohost-addon.zip addons/

      - name: Upload addon package
        uses: actions/upload-artifact@v4
        with:
          name: libretrohost-addon
          path: libretrohost-addon.zip
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [create-addon-package]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download addon package
        uses: actions/download-artifact@v4
        with:
          name: libretrohost-addon
          path: .

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: libretrohost-addon.zip
          name: LibRetroHost ${{ github.ref_name }}
