name: Build and Test

on:
  push:
    branches: [master, develop, scons]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.5"
  SCONS_CACHE_LIMIT: 7168

jobs:
  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux (x86_64)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup GDExtension Build Environment
        uses: NodotProject/godot-cpp-builds@v1
        with:
          godot-version: '4.5-stable'
          godot-cpp-path: './godot-cpp'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          echo "set man-db/auto-update false" | sudo debconf-communicate
          sudo dpkg-reconfigure man-db
          sudo apt-get update
          sudo apt-get install -y build-essential scons

      - name: Setup SCons cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.scons-cache/
          key: ${{ runner.os }}-scons-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/*.h') }}
          restore-keys: |
            ${{ runner.os }}-scons-

      - name: Build GDExtension (Release)
        env:
          SCONS_CACHE_DIR: ${{ github.workspace }}/.scons-cache/
        run: |
          scons platform=linux target=template_release -j$(nproc)

      - name: Build GDExtension (Debug)
        env:
          SCONS_CACHE_DIR: ${{ github.workspace }}/.scons-cache/
        run: |
          scons platform=linux target=template_debug -j$(nproc)

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: libretrohost-linux-x86_64
          path: demo/bin/LibRetroHost/lib/Linux-x86_64/
          retention-days: 7
